# Agent OS Standards Index

codegen:
  codefragment-pattern:
    description: Node generators return CodeFragment dataclass with statements, bindings, imports
  held-error-model:
    description: Parallel branch error handling that preserves LabVIEW semantics
  primitive-hints:
    description: primitives-codegen.json format for mapping LabVIEW primitives to Python
  terminal-name-resolution:
    description: How SubVI terminal names are resolved (vilib vs project SubVIs)

data:
  types-json-schema:
    description: _types.json format for typedef/enum definitions used by vilib VIs
  vilib-json-schema:
    description: data/vilib/*.json format for LabVIEW standard library VI entries
  vilib-status-workflow:
    description: Status field progression (needs_terminals -> needs_review -> complete)

global:
  dataclass-over-dict:
    description: Use typed dataclasses for structured data, not raw dicts

graph:
  generation-order:
    description: get_generation_order() uses SCC detection for recursive VI handling
  two-graph-architecture:
    description: Dependency graph (VI->VI) separate from per-VI dataflow graphs
  vi-context-structure:
    description: Dict format returned by get_vi_context() for code generation

parser:
  tunnel-types:
    description: lSR/rSR shift registers, lpTun pass-through, lMax accumulators
  two-layer-types:
    description: ParsedType (parser) vs LVType (graph) separation
  typeid-resolution:
    description: API for resolving LabVIEW TypeID references to LVType
