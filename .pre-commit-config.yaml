repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: python3 -m pyright src/vipy/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: python3 -m pytest -q
        language: system
        types: [python]
        pass_filenames: false

      - id: sync-skills
        name: sync skill templates
        entry: scripts/sync_skills.sh
        language: system
        files: '^(\.claude/skills/(resolve-primitive|resolve-vilib|describe-vi|convert|idiomatic)/SKILL\.md|src/vipy/skill_templates/claude/.*/SKILL\.md)$'
        pass_filenames: false
